<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — CampusTrack</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div id="navbar-container"></div>

  <div class="container animate-fade-in">
    <div class="auth-wrapper glass-panel">
      <div class="auth-header">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join the AAU community portal to secure your belongings</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="fullname">Full Name</label>
          <input type="text" id="fullname" class="form-control" placeholder="Abdusalam Oumer" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Campus Email</label>
          <input type="email" id="email" class="form-control" placeholder="name@aau.edu.et" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="At least 6 characters" minlength="6" required>
        </div>

        <div class="form-group mb-4">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <div class="form-footer">
        Already have an account? <a href="/login.html">Sign In</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 CampusTrack — Addis Ababa University. All rights reserved.</p>
  </footer>

  <script src="/js/api.js"></script>
  <script>
    if (isAuthenticated()) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('register-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const full_name = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      // Front-end matches check
      if (password !== confirmPassword) {
        showToast('Passwords do not match. Please verify.', 'error');
        return;
      }

      try {
        const result = await apiCall('/auth/register', {
          method: 'POST',
          body: { full_name, email, password }
        });

        showToast(result.message || 'Account created successfully! Redirecting to login...', 'success');
        
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 1500);

      } catch (error) {
        showToast(error.message || 'Registration failed. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
