<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CampusTrack</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div id="navbar-container"></div>

  <div class="container animate-fade-in">
    <div class="auth-wrapper glass-panel">
      <div class="auth-header">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to report items and view potential matches</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Campus Email</label>
          <input type="email" id="email" class="form-control" placeholder="name@aau.edu.et" required>
        </div>

        <div class="form-group mb-4">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="/register.html">Create Account</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 CampusTrack — Addis Ababa University. All rights reserved.</p>
  </footer>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already authenticated
    if (isAuthenticated()) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('login-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const result = await apiCall('/auth/login', {
          method: 'POST',
          body: { email, password }
        });

        // Save session credentials
        saveToken(result.token);
        saveUser(result.user);

        showToast('Login successful! Redirecting...', 'success');
        
        // Wait a second for toast and redirect
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1200);

      } catch (error) {
        showToast(error.message || 'Login failed. Please check credentials.', 'error');
      }
    });
  </script>
</body>
</html>
